#sales_router/src/api_gateway/nginx.conf

# ============================================================
# 📦 SalesRouter API Gateway — nginx.conf (FINAL)
# ============================================================

server {
    listen 80 default_server;
    client_max_body_size 100M;
    listen [::]:80 default_server;
    server_name _;

    # ============================================================
    # 🌐 DNS dinâmico (Docker embedded resolver)
    # ------------------------------------------------------------
    # Sem o resolver + variáveis abaixo, nginx resolve cada hostname
    # uma única vez no startup e cacheia pra sempre. Quando um upstream
    # reinicia e ganha IP diferente na rede Docker, nginx fica martelando
    # o IP velho → "connection refused".
    # Usando variável em proxy_pass, nginx consulta o DNS a cada
    # `valid=30s` e sempre encontra o IP correto.
    # ============================================================
    resolver 127.0.0.11 ipv6=off valid=30s;

    set $pdv_upstream                       "pdv_preprocessing:8000";
    set $cluster_upstream                   "sales_clusterization:8004";
    set $routing_upstream                   "sales_routing:8005";
    set $auth_upstream                      "authentication_service:8000";
    set $cadastros_upstream                 "sales_cadastros:8006";
    set $geocoding_engine_upstream          "geocoding_engine:8007";
    set $routing_engine_upstream            "routing_engine:8008";
    set $clusterization_engine_upstream     "clusterization_engine:8009";
    set $evolution_upstream                 "evolution_api:8080";
    set $frontend_upstream                  "sales_router_frontend:3000";

    set $cors_allow_origin "";

    if ($http_origin ~* ^(https://app\.salesrouter\.com\.br|https://www\.salesrouter\.com\.br|https://salesrouter\.com\.br|http://localhost:(3000|3100)|http://127\.0\.0\.1:(3000|3100))$) {
        set $cors_allow_origin $http_origin;
    }


    # ============================================================
    # 🌐 CORS GLOBAL — Frontend (Next.js) | MODO TRANSIÇÃO
    # ============================================================


    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

    # Esconde headers CORS vindos dos backends (FastAPI usa CORSMiddleware com
    # allow_origins="*"). Sem isso, o browser recebe o header duplicado
    # ("*, https://app.salesrouter.com.br") e bloqueia por política CORS —
    # acontecia em respostas binárias como o XLSX (StreamingResponse).
    # O nginx é a única fonte oficial dos headers CORS.
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;

    if ($request_method = OPTIONS) {
        return 204;
    }


    # ============================================================
    # 🏪 PDV PREPROCESSING API
    # ============================================================

    location /pdv/openapi.json {
        proxy_pass http://$pdv_upstream/openapi.json;
    }

    location /pdv/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/pdv/openapi.json';
        sub_filter '/docs' '/pdv/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$pdv_upstream/docs;
    }

    location /pdv/ {
        proxy_pass http://$pdv_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }


    # ============================================================
    # 🧠 SALES CLUSTERIZATION API
    # ============================================================

    location /cluster/openapi.json {
        proxy_pass http://$cluster_upstream/openapi.json;
    }

    location /cluster/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/cluster/openapi.json';
        sub_filter '/docs' '/cluster/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$cluster_upstream/docs;
    }

    location /cluster/ {
        proxy_pass http://$cluster_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🚚 SALES ROUTING API
    # ============================================================

    location /routing/openapi.json {
        proxy_pass http://$routing_upstream/openapi.json;
    }

    location /routing/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/routing/openapi.json';
        sub_filter '/docs' '/routing/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$routing_upstream/docs;
    }

    location /routing/ {
        proxy_pass http://$routing_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🔐 AUTHENTICATION API
    # ============================================================

    location /auth/openapi.json {
        proxy_pass http://$auth_upstream/openapi.json;
    }

    location /auth/docs {
        proxy_pass http://$auth_upstream/docs;
    }

    location /auth/ {
        proxy_pass http://$auth_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 👥 CADASTROS API (CONSULTORES)
    # ============================================================

    location /consultores {

        proxy_pass http://$cadastros_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🏪 CADASTROS API (PDVs / CLIENTES)
    # ============================================================

    location /pdvs {

        proxy_pass http://$cadastros_upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🌍 GEOCODING API
    # ============================================================

    location /geocode/openapi.json {
        proxy_pass http://$geocoding_engine_upstream/openapi.json;
    }

    location /geocode/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/geocode/openapi.json';
        sub_filter '/docs' '/geocode/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$geocoding_engine_upstream/docs;
    }

    location /geocode/ {
        rewrite ^/geocode/?(.*)$ /$1 break;
        proxy_pass http://$geocoding_engine_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🚚 ROUTING ENGINE (PLANILHA / JOBS)
    # ============================================================

    location /routing-engine/openapi.json {
        proxy_pass http://$routing_engine_upstream/openapi.json;
    }

    location /routing-engine/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/routing-engine/openapi.json';
        sub_filter '/docs' '/routing-engine/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$routing_engine_upstream/docs;
    }

    location /routing-engine/ {
        rewrite ^/routing-engine/?(.*)$ /$1 break;
        proxy_pass http://$routing_engine_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🧩 CLUSTERIZATION ENGINE (PLANILHA / ALGORITMOS MODULARES)
    # ============================================================

    location /clusterization-engine/openapi.json {
        proxy_pass http://$clusterization_engine_upstream/openapi.json;
    }

    location /clusterization-engine/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/clusterization-engine/openapi.json';
        sub_filter '/docs' '/clusterization-engine/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$clusterization_engine_upstream/docs;
    }

    location /clusterization-engine/ {
        rewrite ^/clusterization-engine/?(.*)$ /$1 break;
        proxy_pass http://$clusterization_engine_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
    # ============================================================
    # 📦 MAPAS / OUTPUTS GERADOS
    # ============================================================

    location /output/ {
        alias /app/output/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-cache";
    }

    # ============================================================
    # 🔁 N8N WEBHOOKS
    # ============================================================

    location /n8n-webhook/ {
        proxy_pass http://3.211.108.148:5678/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
    }

    # ============================================================
    # 📱 EVOLUTION API (WhatsApp Manager)
    # ============================================================

    location /evolution/ {
        rewrite ^/evolution/?(.*)$ /$1 break;
        proxy_pass http://$evolution_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # ❤️ HEALTH CHECKS
    # ============================================================

    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ============================================================
    # 🖥️ FRONTEND (Next.js) — catch-all
    # ============================================================

    location / {
        proxy_pass http://$frontend_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ============================================================
    # ⏱️ TIMEOUTS / BUFFERING
    # ============================================================

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    proxy_request_buffering on;
    proxy_buffering on;

    client_body_buffer_size 10M;

    proxy_buffers 16 512k;
    proxy_buffer_size 512k;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}
