#sales_router/src/api_gateway/nginx.conf

# ============================================================
# 📦 SalesRouter API Gateway — nginx.conf (FINAL)
# ============================================================

server {
    listen 80 default_server;
    client_max_body_size 100M;
    listen [::]:80 default_server;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $geocoding_engine_upstream geocoding_engine:8007;


    # ============================================================
    # 🌐 CORS GLOBAL — Frontend (Next.js) | MODO TRANSIÇÃO
    # ============================================================

    
    add_header Access-Control-Allow-Origin "https://www.salesrouter.com.br" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;

    if ($request_method = OPTIONS) {
        return 204;
    }


    # ============================================================
    # 🏪 PDV PREPROCESSING API
    # ============================================================

    location /pdv/openapi.json {
        proxy_pass http://pdv_preprocessing:8000/openapi.json;
    }

    location /pdv/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/pdv/openapi.json';
        sub_filter '/docs' '/pdv/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://pdv_preprocessing:8000/docs;
    }

    location /pdv/ {

        proxy_pass http://pdv_preprocessing:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }


    # ============================================================
    # 🧠 SALES CLUSTERIZATION API
    # ============================================================

    location /cluster/openapi.json {
        proxy_pass http://sales_clusterization:8004/openapi.json;
    }

    location /cluster/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/cluster/openapi.json';
        sub_filter '/docs' '/cluster/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://sales_clusterization:8004/docs;
    }

    location /cluster/ {
        proxy_pass http://sales_clusterization:8004;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🚚 SALES ROUTING API
    # ============================================================

    location /routing/openapi.json {
        proxy_pass http://sales_routing:8005/openapi.json;
    }

    location /routing/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/routing/openapi.json';
        sub_filter '/docs' '/routing/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://sales_routing:8005/docs;
    }

    location /routing/ {
        proxy_pass http://sales_routing:8005;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🔐 AUTHENTICATION API
    # ============================================================

    location /auth/openapi.json {
        proxy_pass http://authentication_service:8000/openapi.json;
    }

    location /auth/docs {
        proxy_pass http://authentication_service:8000/docs;
    }

    location /auth/ {
        proxy_pass http://authentication_service:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 👥 CADASTROS API (CONSULTORES)
    # ============================================================

    location /consultores {

        proxy_pass http://sales_cadastros:8006;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🌍 GEOCODING API
    # ============================================================

    location /geocode/openapi.json {
        proxy_pass http://$geocoding_engine_upstream/openapi.json;
    }

    location /geocode/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/geocode/openapi.json';
        sub_filter '/docs' '/geocode/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://$geocoding_engine_upstream/docs;
    }

    location /geocode/ {
        rewrite ^/geocode/?(.*)$ /$1 break;
        proxy_pass http://$geocoding_engine_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # ============================================================
    # 🚚 ROUTING ENGINE (PLANILHA / JOBS)
    # ============================================================

    location /routing-engine/openapi.json {
        proxy_pass http://routing_engine:8008/openapi.json;
    }

    location /routing-engine/docs {
        sub_filter_once off;
        sub_filter '/openapi.json' '/routing-engine/openapi.json';
        sub_filter '/docs' '/routing-engine/docs';
        proxy_set_header Accept-Encoding "";
        proxy_pass http://routing_engine:8008/docs;
    }

    location /routing-engine/ {
        proxy_pass http://routing_engine:8008/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
    # ============================================================
    # 📦 MAPAS / OUTPUTS GERADOS
    # ============================================================

    location /output/ {
        alias /app/output/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-cache";
    }

    # ============================================================
    # ❤️ HEALTH CHECKS
    # ============================================================

    location = / {
        return 200 'API Gateway ativo 🚀';
        add_header Content-Type text/plain;
    }

    location = /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ============================================================
    # ⏱️ TIMEOUTS / BUFFERING
    # ============================================================

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    proxy_request_buffering on;
    proxy_buffering on;

    client_body_buffer_size 10M;

    proxy_buffers 16 512k;
    proxy_buffer_size 512k;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}