#sales_router/src/geocoding_engine/docker-compose.yml

services:

  geocoding_engine:

    build:
      context: ../..
      dockerfile: ./src/geocoding_engine/Dockerfile.geocoding

    container_name: geocoding_engine

    env_file:
      - ../../.env

    environment:
      - PYTHONPATH=/app/src
      - DB_HOST=sales_router_db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - NOMINATIM_LOCAL_URL=${NOMINATIM_LOCAL_URL}
      - GMAPS_API_KEY=${GMAPS_API_KEY}
      - ENABLE_GOOGLE_GEOCODING=true

    volumes:
      - ../../src/geocoding_engine:/app/src/geocoding_engine
      - ../../src/database:/app/src/database
      - ../../data:/app/data
      - ../../output:/app/output

    ports:
      - "8014:8007"

    networks:
      - sales_router_net

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/docs"]
      interval: 30s
      timeout: 5s
      retries: 3


  geocoding_jobs_worker:

    build:
      context: ../..
      dockerfile: ./src/geocoding_engine/Dockerfile.geocoding

    env_file:
      - ../../.env

    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379/0
      - NOMINATIM_LOCAL_URL=${NOMINATIM_LOCAL_URL}
      - GMAPS_API_KEY=${GMAPS_API_KEY}
      - GEOCODE_BATCH_JSON_CHUNK_SIZE=${GEOCODE_BATCH_JSON_CHUNK_SIZE:-25}
      - GEOCODE_SUBJOB_TIMEOUT=${GEOCODE_SUBJOB_TIMEOUT:-1800}

    depends_on:
      - geocoding_engine

    volumes:
      - ../../src:/app/src
      - ../../data:/app/data
      - ../../output:/app/output

    networks:
      - sales_router_net

    command: >
      rq worker -v -u redis://redis:6379/0 geocode_jobs

    restart: always

  geocoding_subjobs_worker:

    build:
      context: ../..
      dockerfile: ./src/geocoding_engine/Dockerfile.geocoding

    env_file:
      - ../../.env

    environment:
      - PYTHONPATH=/app/src
      - REDIS_URL=redis://redis:6379/0
      - NOMINATIM_LOCAL_URL=${NOMINATIM_LOCAL_URL}
      - GMAPS_API_KEY=${GMAPS_API_KEY}
      - GEOCODE_SUBJOB_MICROBATCH_SIZE=${GEOCODE_SUBJOB_MICROBATCH_SIZE:-10}

    depends_on:
      - geocoding_engine

    volumes:
      - ../../src:/app/src
      - ../../data:/app/data
      - ../../output:/app/output

    networks:
      - sales_router_net

    command: >
      rq worker -v -u redis://redis:6379/0 geocode_subjobs

    restart: always

networks:

  sales_router_net:
    external: true
